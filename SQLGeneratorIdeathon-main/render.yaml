# Render Blueprint: single web service (API + frontend via Docker)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sql-generator
    runtime: docker
    # Use Dockerfile inside this folder so a single Dockerfile lives with frontend/ and backend/
    dockerfilePath: ./SQLGeneratorIdeathon-main/Dockerfile
    dockerContext: ./SQLGeneratorIdeathon-main

    envVars:
      - key: JWT_SECRET
        generateValue: true
      # Add in Render dashboard: OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY if you use them
      # DATABASE_URL defaults to sqlite (ephemeral on free tier; add Render PostgreSQL for persistence)
